spring.application.name=eureka-server

server.port=8761

eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
eureka.renewalPercentThreshold=0.85

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# Fast response cache refresh (default 30s -> 2s)
eureka.server.response-cache-update-interval-ms=2000
# Disable self-preservation in dev (avoids keeping stale instances)
eureka.server.enable-self-preservation=false
# Faster eviction of dead instances (default 60s -> 5s)
eureka.server.eviction-interval-timer-in-ms=5000
