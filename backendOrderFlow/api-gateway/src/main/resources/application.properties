spring.application.name=api-gateway
server.port=8765

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
# Fast registry refresh (default 30s -> 5s)
eureka.client.registry-fetch-interval-seconds=5

spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:4200,http://localhost:3000,http://localhost:4201
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH,HEAD
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allow-credentials=true
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].max-age=3600
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].exposed-headers=Authorization,Content-Type,X-User-Email,X-User-Role

jwt.secret=${JWT_SECRET:orderflow-local-dev-jwt-secret-2026-hs256-min-32-bytes}
gateway.auth.internal-secret=${GATEWAY_AUTH_INTERNAL_SECRET:change-me-gateway-dev-only}

eureka.instance.ip-address=127.0.0.1
eureka.instance.prefer-ip-address=true

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.urls[0].name=auth-service
springdoc.swagger-ui.urls[0].url=/api/auth/api-docs
springdoc.swagger-ui.urls[1].name=catalog-service
springdoc.swagger-ui.urls[1].url=/api/products/api-docs
springdoc.swagger-ui.urls[2].name=order-service
springdoc.swagger-ui.urls[2].url=/api/orders/api-docs
springdoc.swagger-ui.urls[3].name=chat-service
springdoc.swagger-ui.urls[3].url=/api/chats/api-docs
springdoc.swagger-ui.urls[4].name=document-service
springdoc.swagger-ui.urls[4].url=/api/documents/api-docs

